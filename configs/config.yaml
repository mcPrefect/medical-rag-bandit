# Medical RAG Bandit Configuration

# Experiment Settings
experiment:
  name: "medical_rag_mvp"
  n_examples: 100
  random_seed: 42
  
# Data Paths
data:
  pubmedqa_path: "data/pubmedqa/ori_pqal.json"
  output_dir: "results/"
  
# LLM Settings
llm:
  model_name: "Qwen/Qwen2.5-14B-Instruct"
  device: "cuda"
  max_new_tokens: 50
  
# Retrieval Arms
retrieval:
  fast_arm:
    top_k: 3
  deep_arm:
    top_k: 5
  kg_arm:
    top_k: 5
    
# Bandit Settings
bandit:
  n_arms: 3
  n_features: 10
  alpha: 2.0
  
# Reward Function (Section 3.3.2 of Interim Report)
# R = w_guideline·R_guideline + w_quality·R_quality + w_latency·R_latency + w_safety·R_safety
reward:
  w_guideline: 0.55          # Guideline adherence — weighted highest for evidence-based practice
  w_quality: 0.25            # Answer quality (exact match / F1)
  w_latency: 0.10            # Latency: max(0, 1 - time_taken/time_budget)
  w_safety: 0.10             # Binary: 1.0 if safe, 0.0 if flagged
  time_budget: 10.0          # Seconds — max acceptable response time
  safety_kill_switch: true   # If true, safety failure zeros entire reward (R <- 0)
  use_bertscore: true        # Compute BERTScore for guideline adherence
  bertscore_model: "microsoft/deberta-base-mnli"  # Model for BERTScore
  # Legacy field kept for backward compat
  latency_penalty_weight: 0.1
  
# Safety Validator
safety:
  enabled: true
  confidence_threshold: 0.7
  min_evidence_sentences: 2
  min_evidence_words_per_sentence: 5
  
# Logging
logging:
  verbose: true